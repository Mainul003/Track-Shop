<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Search — ShopNow</title>
<link rel="stylesheet" href="css/main.css"/>
  
  <!-- Add before closing </head> tag -->
<script async src="https://stage-app.clubeez.com/umerang_min_001.js?merchantId=UT6D092CA5"></script>
 
</head>
<body>

<div id="nav-root"></div>

<div class="container page-wrap">
  <div class="breadcrumb">
    <a href="index.html">Home</a> › <span>Search Results</span>
  </div>

  <div class="search-banner" id="search-banner"></div>

  <div id="results-grid"></div>
</div>

<div id="footer-root"></div>

<script src="js/app.js"></script>
<script>
  document.getElementById('nav-root').innerHTML = renderNav('');
  document.getElementById('footer-root').innerHTML = renderFooter();

  const q = new URLSearchParams(location.search).get('q') || '';
  document.title = `"${q}" — ShopNow`;

  if (q) document.getElementById('nav-q').value = q;

  const results = q
    ? PRODUCTS.filter(p =>
        p.name.toLowerCase().includes(q.toLowerCase()) ||
        p.cat.toLowerCase().includes(q.toLowerCase()) ||
        p.desc.toLowerCase().includes(q.toLowerCase()))
    : [];

  document.getElementById('search-banner').innerHTML =
    q ? `Search results for "<strong>${q}</strong>" — <strong>${results.length}</strong> product${results.length !== 1 ? 's' : ''} found`
      : 'Enter a search term above.';

  const grid = document.getElementById('results-grid');
  if (results.length > 0) {
    grid.className = 'product-grid';
    // Use data-search-result attribute so Umerang fires search_result_click
    grid.innerHTML = results.map(p => {
      const badgeHTML = p.badge ? `<div class="pc-badge"><span class="badge badge-${p.badgeType}">${p.badge}</span></div>` : '';
      return `
        <div class="product-card" data-search-result="true"
          data-product-id="${p.id}" data-product-name="${p.name}"
          onclick="goProduct('${p.id}')">
          <div class="pc-img">${badgeHTML}${p.emoji}</div>
          <div class="pc-body">
            <div class="pc-cat">${p.cat}</div>
            <div class="pc-name">${p.name}</div>
            <div class="pc-stars">${stars(p.rating)} <span>(${p.reviews.toLocaleString()})</span></div>
            <div class="pc-price">${fmt(p.price)}</div>
            <div class="pc-actions">
              <button class="btn btn-ink btn-sm" style="flex:1"
                onclick="event.stopPropagation();cartAdd('${p.id}');showCartToast('${p.name}')">Add to Cart</button>
              <button class="btn btn-ghost btn-sm"
                onclick="event.stopPropagation();goProduct('${p.id}')">View →</button>
            </div>
          </div>
        </div>`;
    }).join('');
  } else if (q) {
    grid.innerHTML = `
      <div class="no-results">
        <div class="no-results-icon">🔍</div>
        <h3 style="font-family:'Fraunces',serif;margin-bottom:10px">No results for "${q}"</h3>
        <p style="margin-bottom:20px">Try a different search or browse all products.</p>
        <button class="btn btn-ink" onclick="goProducts()">Browse All Products</button>
      </div>`;
  }
</script>
</body>
</html>
